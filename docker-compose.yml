services:
  alphasign-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alphasign-backend
    environment:
      ADAPTER_PORT: ${ADAPTER_PORT:-8765}
      ADAPTER_ALLOWED_ORIGIN: ${ADAPTER_ALLOWED_ORIGIN:-*}
      CONVERSATION_LOG_PATH: ${CONVERSATION_LOG_PATH:-/data/alphasign_conversation.txt}
      PDF_OUTPUT_PATH: ${PDF_OUTPUT_PATH:-/data/alphasign_report.pdf}
      MAX_TURNS_PER_SESSION: ${MAX_TURNS_PER_SESSION:-3}
      THENVOI_WS_URL: ${THENVOI_WS_URL:-}
      THENVOI_REST_URL: ${THENVOI_REST_URL:-}
      BAND_SIGNAL_PROCESSING_AGENT_ID: ${BAND_SIGNAL_PROCESSING_AGENT_ID:-}
      BAND_SIGNAL_PROCESSING_API_KEY: ${BAND_SIGNAL_PROCESSING_API_KEY:-}
      BAND_NARRATIVE_ANALYST_AGENT_ID: ${BAND_NARRATIVE_ANALYST_AGENT_ID:-}
      BAND_NARRATIVE_ANALYST_API_KEY: ${BAND_NARRATIVE_ANALYST_API_KEY:-}
      BAND_LATENT_STATE_AGENT_ID: ${BAND_LATENT_STATE_AGENT_ID:-}
      BAND_LATENT_STATE_API_KEY: ${BAND_LATENT_STATE_API_KEY:-}
      BAND_START_AGENT_ID: ${BAND_START_AGENT_ID:-}
      BAND_START_AGENT_API_KEY: ${BAND_START_AGENT_API_KEY:-}
      FEATHERLESS_API_KEY: ${FEATHERLESS_API_KEY:-}
      FEATHERLESS_BASE_URL: ${FEATHERLESS_BASE_URL:-}
      LATENT_STATE_MODEL: ${LATENT_STATE_MODEL:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-}
      AIML_API_KEY: ${AIML_API_KEY:-}
      AIML_BASE_URL: ${AIML_BASE_URL:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-}
      GROQ_MODEL: ${GROQ_MODEL:-}
      EXECUTIVE_MODEL: ${EXECUTIVE_MODEL:-}
      EXECUTIVE_MAX_TOKENS: ${EXECUTIVE_MAX_TOKENS:-4096}
      EXECUTIVE_TIMEOUT_SECONDS: ${EXECUTIVE_TIMEOUT_SECONDS:-90}
      FRED_API_KEY: ${FRED_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      SIGNAL_PROCESSING_PROVIDER: ${SIGNAL_PROCESSING_PROVIDER:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "${ADAPTER_PORT:-8765}:8765"
    volumes:
      - backend-data:/data
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: alphasign-cloudflared
    depends_on:
      - alphasign-backend
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in the stack environment}
    restart: unless-stopped

volumes:
  backend-data:
