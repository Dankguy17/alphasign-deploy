services:
  alphasign-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alphasign-backend
    environment:
      ADAPTER_PORT: ${ADAPTER_PORT:-8765}
      ADAPTER_ALLOWED_ORIGIN: ${ADAPTER_ALLOWED_ORIGIN:-*}
      CONVERSATION_LOG_PATH: ${CONVERSATION_LOG_PATH:-/data/alphasign_conversation.txt}
      PDF_OUTPUT_PATH: ${PDF_OUTPUT_PATH:-/data/alphasign_report.pdf}
    ports:
      - "${ADAPTER_PORT:-8765}:8765"
    volumes:
      - backend-data:/data
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: alphasign-cloudflared
    depends_on:
      - alphasign-backend
    command: >
      sh -c '
        if [ -n "$CLOUDFLARE_TUNNEL_TOKEN" ]; then
          exec cloudflared tunnel --no-autoupdate run
        else
          echo "CLOUDFLARE_TUNNEL_TOKEN is not set; cloudflared will stay idle."
          tail -f /dev/null
        fi
      '
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped

volumes:
  backend-data:
